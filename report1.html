<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Substation Score Sheet Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #0369a1;
      --border: #cbd5e1;
      --text: #1e293b;
      --text-light: #64748b;
      --bg-light: #f8fafc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      padding: 20px;
      color: var(--text);
      line-height: 1.3;
      font-size: 10px;
      background: #f1f5f9;
    }

    #pdfContent {
      background: white;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 0.4in 0.5in;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    /* Professional Header */
    .report-header {
      border-bottom: 2px solid var(--primary);
      padding-bottom: 10px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .report-title h1 {
      font-size: 16px;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .report-subtitle {
      font-size: 10px;
      color: var(--text-light);
      font-weight: 600;
    }

    /* Meta Grid */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      background: var(--bg-light);
      padding: 10px 15px;
      border-radius: 4px;
      margin-bottom: 15px;
      border: 1px solid var(--border);
    }

    .meta-item { display: flex; flex-direction: column; }
    .meta-label { font-size: 8px; color: var(--text-light); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; }
    .meta-value { font-weight: 600; font-size: 11px; color: var(--text); margin-top: 2px; }

    /* Tables */
    .section {
      margin-bottom: 12px;
      page-break-inside: avoid;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
    }

    th {
      background: var(--primary);
      color: white;
      text-align: left;
      font-size: 9px;
      text-transform: uppercase;
      padding: 5px 8px;
    }

    th.center { text-align: center; }

    td {
      padding: 5px 8px;
      border-bottom: 1px solid #e2e8f0;
      border-right: 1px solid #e2e8f0;
      vertical-align: top;
    }

    td:last-child { border-right: none; }

    tr:nth-child(even) { background: #fdfdfd; }

    .item-name { font-weight: 600; font-size: 10px; color: var(--text); }
    
    .remarks-text {
      margin-top: 2px;
      font-size: 9px;
      color: var(--text-light);
      font-style: italic;
    }

    .photo-grid {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }

    .photo-thumb {
      width: 40px;
      height: 30px;
      object-fit: cover;
      border-radius: 2px;
      border: 1px solid #cbd5e1;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .photo-thumb:hover { transform: scale(1.1); }

    /* Lightbox */
    .lightbox-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: all 0.25s ease;
    }
    .lightbox-overlay.show { opacity: 1; visibility: visible; }
    .lightbox-img {
      max-width: 90vw; max-height: 85vh; border-radius: 4px; object-fit: contain;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .lightbox-close {
      position: fixed; top: 1.5rem; right: 1.5rem; width: 40px; height: 40px;
      background: rgba(255,255,255,0.1); border: none; border-radius: 50%;
      color: white; font-size: 1.5rem; cursor: pointer;
    }
    .lightbox-download {
      position: fixed; bottom: 2rem; right: 2rem; background: var(--primary);
      color: white; width: 50px; height: 50px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 1.25rem;
      text-decoration: none; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .score-cell {
      text-align: center;
      font-weight: 700;
      font-size: 11px;
    }

    .total-row td {
      background: #f1f5f9;
      font-weight: 700;
      border-bottom: none;
      padding: 6px 8px;
    }

    /* Grand Total */
    .grand-total-container {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
      page-break-inside: avoid;
    }

    .grand-total-box {
      background: var(--primary);
      color: white;
      padding: 10px 20px;
      border-radius: 4px;
      text-align: right;
    }

    .grand-total-label { font-size: 9px; text-transform: uppercase; opacity: 0.9; }
    .grand-total-value { font-size: 18px; font-weight: 800; }

    /* Signatures */
    .signature-section {
      margin-top: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      page-break-inside: avoid;
    }

    .sig-line {
      border-top: 1px solid var(--border);
      padding-top: 6px;
      text-align: center;
      font-weight: 600;
      font-size: 10px;
      color: var(--text-light);
    }

    .no-print {
      text-align: center;
      margin: 20px 0;
    }

    @media print {
      body { background: white; padding: 0; }
      #pdfContent { padding: 0; box-shadow: none; max-width: none; border: none; }
      .no-print { display: none; }
    }

    @media screen and (max-width: 600px) {
      body { padding: 10px; }
      #pdfContent { padding: 15px; }
      .meta-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .meta-item:nth-child(5) { grid-column: span 2; }
      .signature-section { grid-template-columns: 1fr; gap: 20px; margin-top: 30px; }
    }
  </style>
</head>
<body>
  <div class="no-print">
    <button onclick="exportPdfAndSave()" style="padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;">
      <i class="fas fa-download"></i> Download
    </button>
  </div>

  <div id="pdfContent">
    <div class="report-header">
      <div class="report-title">
        <h1>SS Upkeeping Report</h1>
      </div>
    </div>

    <div class="meta-grid">
      <div class="meta-item"><span class="meta-label">Substation</span><span class="meta-value" id="subTitle">-</span></div>
      <div class="meta-item"><span class="meta-label">Date of Visit</span><span class="meta-value" id="visitDate">-</span></div>
      <div class="meta-item"><span class="meta-label">Division</span><span class="meta-value" id="divName">-</span></div>
      <div class="meta-item"><span class="meta-label">Inspecting Officer</span><span class="meta-value" id="officerName">-</span></div>
      <div class="meta-item"><span class="meta-label">Supervising DE/AE</span><span class="meta-value" id="supervisorName">-</span></div>
    </div>

    <div id="reportContent"></div>

    <div class="grand-total-container">
      <div class="grand-total-box">
        <div class="grand-total-label">Final Score</div>
        <div class="grand-total-value" id="grandVal">0 / 0</div>
      </div>
    </div>

    <div class="signature-section">
      <div class="sig-line" id="sigOfficer">Inspecting Officer</div>
      <div class="sig-line">Substation In-Charge</div>
    </div>
  </div>

  <!-- Photo Lightbox -->
  <div id="lightbox" class="lightbox-overlay no-print">
    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <img id="lightboxImg" class="lightbox-img" src="" alt="Photo preview">
    <a id="lightboxDownload" href="" class="lightbox-download" download="photo.jpg"><i class="fas fa-download"></i></a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    const data = JSON.parse(localStorage.getItem('scoreReport'));

    function formatDate(input) {
      if (!input) return '-';
      const d = new Date(input);
      if (!isNaN(d.getTime())) return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      const parts = input.split('/');
      if (parts.length === 3) {
        const d2 = new Date(`${parts[1]}/${parts[0]}/${parts[2]}`);
        if (!isNaN(d2.getTime())) return d2.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      }
      return input;
    }

    function buildSection(fields) {
      const aestheticsMaxMap = {
        "Beds in control room": 5, "TV set in control room": 5, "Operating persons dressed properly?": 5,
        "Switchgear / feeder / PTR name-plates quality": 7, "Helmet use in switch yard": 5,
        "Back-side of switchgears / panels": 5, "Cable trench cover status": 5,
        "Garden / plantation condition": 5, "Last condition monitoring issues complied with?": 10
      };

      return fields.map(field => {
        const photosStr = data[`${field} - Photos`] || '';
        return {
          name: field,
          score: Number(data[field]) || 0,
          maxPoints: aestheticsMaxMap[field] || 2,
          remarks: data[`${field} - Remarks`] || '',
          photos: photosStr ? photosStr.split(',').map(u => u.trim()).filter(Boolean) : []
        };
      });
    }

    function renderSection(title, items) {
      let html = `<div class="section">
        <table>
          <thead>
            <tr>
              <th style="width: 75%">${title}</th>
              <th class="center" style="width: 12.5%">Score</th>
              <th class="center" style="width: 12.5%">Max</th>
            </tr>
          </thead>
          <tbody>`;
      
      let totalScore = 0, totalMax = 0;

      items.forEach(i => {
        const hasRemarks = i.remarks && i.remarks.trim();
        const hasPhotos = i.photos && i.photos.length > 0;

        let detailsHtml = `<div class="item-name">${i.name}</div>`;
        if (hasRemarks) detailsHtml += `<div class="remarks-text">${i.remarks}</div>`;
        if (hasPhotos) {
          detailsHtml += `<div class="photo-grid">` + 
            i.photos.map(src => `<img src="${src}" class="photo-thumb" crossorigin="anonymous" onclick="openLightbox('${src}')">`).join('') + 
            `</div>`;
        }

        html += `<tr>
          <td>${detailsHtml}</td>
          <td class="score-cell">${i.score}</td>
          <td class="score-cell" style="color: var(--text-light);">${i.maxPoints}</td>
        </tr>`;

        totalScore += i.score;
        totalMax += i.maxPoints;
      });

      html += `<tr class="total-row">
        <td style="text-align: right; text-transform: uppercase; font-size: 9px; color: var(--text-light);">Subtotal</td>
        <td class="score-cell" style="color: var(--primary);">${totalScore}</td>
        <td class="score-cell">${totalMax}</td>
      </tr></tbody></table></div>`;
      
      return { html, totalScore, totalMax };
    }

    if (data) {
      document.getElementById('subTitle').textContent = data.Substation || '-';
      document.getElementById('visitDate').textContent = formatDate(data.Date);
      document.getElementById('divName').textContent = data.Division || '-';
      document.getElementById('officerName').textContent = data["Inspecting Officer"] || '-';
      document.getElementById('supervisorName').textContent = data.Supervisor || '-';

      const sectionsMap = [
        { title: "I. Cleanliness & Housekeeping", keys: ["Control room building - inside", "Control room building - outside", "Switchgears, panels", "Switch Yard", "Battery room", "Bathroom / toilet", "Roof & surroundings"] },
        { title: "II. Equipment Health & Defective Items", keys: ["Switchgear", "Ammeter/ voltmeter in circuit", "Relays in circuit", "Indication lamp", "Annunciation (hooter)", "Cell tester", "Hydrometer", "CT / PT (33kV & 11kV)", "LA (33kV & 11kV)", "Yard-light", "Tube-lights in control room", "Fans in control room"] },
        { title: "III. Record Keeping & Documentation", keys: ["Standard size SLD", "Notice board", "Duty roster", "Attendance register", "Permit-to-work book", "Shut-down / Break-down register", "Tripping register", "Log-book", "Daily test report of battery", "History Book", "Inspection Book"] },
        { title: "IV. Substation Essentials", keys: ["Table & chairs (including visitor's)", "Signboard", "Entry Restricted / প্রবেশ নিষেধ board", "Almirah", "Water purifier", "Shut-down / break-down boards", "Telephone / mobile phone", "Illumination of control room", "Torch", "Wall clock"] },
        { title: "V. Safety Equipment & Compliance", keys: ["Fire extinguisher", "First-aid box with medicines", "33kV hand gloves", "11kV hand gloves", "Discharge rod", "Helmet", "High Voltage detector", "Raincoat", "Gumboot"] },
        { title: "VI. Aesthetics, Discipline & Compliance", keys: ["Beds in control room", "TV set in control room", "Operating persons dressed properly?", "Switchgear / feeder / PTR name-plates quality", "Helmet use in switch yard", "Back-side of switchgears / panels", "Cable trench cover status", "Garden / plantation condition", "Last condition monitoring issues complied with?"] }
      ];

      let grandScore = 0, grandMax = 0;
      let combinedHtml = '';

      sectionsMap.forEach(sec => {
        const { html, totalScore, totalMax } = renderSection(sec.title, buildSection(sec.keys));
        combinedHtml += html;
        grandScore += totalScore;
        grandMax += totalMax;
      });

      document.getElementById('reportContent').innerHTML = combinedHtml;
      document.getElementById('grandVal').textContent = `${grandScore} / ${grandMax}`;
      
      if (data["Inspecting Officer"]) {
        document.getElementById('sigOfficer').textContent = `Inspecting Officer: ${data["Inspecting Officer"]}`;
      }
    }

    function exportPdfAndSave() {
      const element = document.getElementById('pdfContent');
      const ssName = (data.Substation || 'Substation').replace(/\s+/g, '_');
      const dateStr = formatDate(data.Date).replace(/ /g, '-');
      // pagebreak setting crucial for dynamic height
      const opt = {
        margin: [0.3, 0.3, 0.3, 0.3],
        filename: `${ssName}_${dateStr}_Audit.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, logging: false },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['css', 'legacy'] }
      };
      html2pdf().set(opt).from(element).save();
    }

    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightboxDownload').href = src;
      document.getElementById('lightbox').classList.add('show');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('show');
      setTimeout(() => { document.getElementById('lightboxImg').src = ''; }, 300);
    }
  </script>
</body>
</html>
