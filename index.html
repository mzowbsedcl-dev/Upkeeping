<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Substation Upkeeping Score Sheet</title>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0ea5e9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Upkeeping">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Modern CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* CSS Custom Properties - Modern Color Palette */
        :root {
            /* Primary Colors */
            --primary-50: #f0f9ff;
            --primary-100: #e0f2fe;
            --primary-500: #0ea5e9;
            --primary-600: #0284c7;
            --primary-700: #0369a1;

            /* Neutral Colors */
            --neutral-50: #fafafa;
            --neutral-100: #f5f5f5;
            --neutral-200: #e5e5e5;
            --neutral-300: #d4d4d4;
            --neutral-400: #a3a3a3;
            --neutral-500: #737373;
            --neutral-600: #525252;
            --neutral-700: #404040;
            --neutral-800: #262626;
            --neutral-900: #171717;

            /* Status Colors */
            --green-50: #f0fdf4;
            /* New light green for completed cards */
            --green-500: #22c55e;
            --green-600: #16a34a;
            --amber-500: #f59e0b;
            --amber-600: #d97706;
            --red-500: #ef4444;
            --red-600: #dc2626;

            /* Semantic Colors */
            --bg-primary: #f0f0f0;
            /* Slightly darker background */
            --bg-secondary: #ffffff;
            --bg-tertiary: var(--neutral-100);
            --text-primary: var(--neutral-900);
            --text-secondary: var(--neutral-600);
            --text-muted: var(--neutral-500);
            --border-color: var(--neutral-200);
            --border-focus: var(--primary-500);

            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);

            /* Border Radius */
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;

            /* Spacing */
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.6;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-4);
            padding-top: 80px;
        }

        /* Modern Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
            padding: var(--space-4) var(--space-6);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            /* Changed to space-between to push reset button to the right */
        }

        .header h1 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .logo-wrapper {
            position: relative;
            display: inline-flex;
            font-size: 1.5rem;
        }

        .logo-mzo {
            position: absolute;
            top: -4px;
            right: -10px;
            background: var(--primary-600);
            color: white;
            font-size: 9px;
            font-weight: 800;
            padding: 1px 4px;
            border-radius: 4px;
            text-transform: uppercase;
            line-height: 1;
            box-shadow: var(--shadow-sm);
        }

        /* Style for the new Reset button in the header */
        .header .btn-reset {
            background: var(--neutral-200);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            /* Smaller padding for header button */
            font-size: 0.8rem;
            /* Smaller font size */
            border-radius: var(--radius-md);
            border: 1px solid var(--neutral-300);
        }

        .header .btn-reset:hover {
            background: var(--neutral-300);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }


        /* Modern Cards */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--neutral-300);
        }

        /* Progress Card */
        .progress-card {
            padding: var(--space-6);
            margin-bottom: var(--space-6);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-4);
        }

        .progress-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .progress-stats {
            display: flex;
            gap: var(--space-4);
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .progress-stat {
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }

        .progress-bar-container {
            height: 8px;
            background: var(--neutral-200);
            border-radius: var(--radius-sm);
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-500), var(--primary-600));
            border-radius: var(--radius-sm);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        /* Form Card */
        .form-card {
            padding: var(--space-6);
            margin-bottom: var(--space-6);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--space-4);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        /* Removed form-label styling as labels are being removed */
        /* .form-label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-primary);
} */

        .form-control {
            padding: 0.75rem var(--space-4);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: all 0.2s ease;
            position: relative;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        /* Score Cards Grid */
        .score-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: var(--space-6);
            margin-bottom: var(--space-8);
        }

        .score-card {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: var(--radius-xl);
        }

        .score-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .score-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-500), var(--primary-600));
        }

        .card-header {
            padding: var(--space-6);
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, var(--primary-50), var(--neutral-50));
        }

        .card-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.5rem;
            height: 2.5rem;
            background: var(--primary-500);
            color: white;
            border-radius: 50%;
            font-weight: 700;
            font-size: 1.125rem;
            margin-bottom: var(--space-3);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .card-content {
            padding: var(--space-6);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-stats {
            display: flex;
            flex-direction: column;
            gap: var(--space-1);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .stat-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .stat-max {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .view-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2.5rem;
            height: 2.5rem;
            background: var(--neutral-100);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        .view-btn:hover {
            background: var(--primary-500);
            color: white;
            border-color: var(--primary-500);
            transform: scale(1.1);
        }

        /* Action Buttons */
        .actions {
            display: flex;
            justify-content: center;
            gap: var(--space-4);
            margin: var(--space-8) 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: 0.75rem var(--space-6);
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: var(--primary-500);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-600);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-success {
            background: var(--green-500);
            color: white;
        }

        .btn-success:hover {
            background: var(--green-600);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        /* Modern Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: var(--space-4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            max-width: 90vw;
            max-height: 90vh;
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.show .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: var(--space-6);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            /* Changed to space-between */
            background: var(--bg-tertiary);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .modal-close {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border: none;
            background: none;
            color: var(--text-muted);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.25rem;
        }

        .modal-close:hover {
            background: var(--neutral-200);
            color: var(--text-primary);
        }

        .modal-body {
            padding: var(--space-6);
            max-height: 60vh;
            overflow-y: auto;
        }

        /* Score Items List */
        .score-items {
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }

        .score-item {
            padding: var(--space-4);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            background: var(--bg-tertiary);
        }

        .item-name {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: var(--space-3);
            padding: var(--space-2) var(--space-3);
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--primary-500);
        }

        .score-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: var(--space-2);
        }

        .score-btn {
            padding: var(--space-2) var(--space-3);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            position: relative;
            /* Added for score animation positioning */
        }

        .score-btn:hover {
            border-color: var(--neutral-300);
            background: var(--neutral-100);
        }

        .score-btn.selected {
            color: white;
            font-weight: 600;
        }

        .score-btn.selected.good {
            background: var(--green-500);
            border-color: var(--green-500);
        }

        .score-btn.selected.average {
            background: var(--amber-500);
            border-color: var(--amber-500);
        }

        .score-btn.selected.bad {
            background: var(--red-500);
            border-color: var(--red-500);
        }

        .score-btn.good:not(.selected):hover {
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--green-500);
            color: var(--green-600);
        }

        .score-btn.average:not(.selected):hover {
            background: rgba(245, 158, 11, 0.1);
            border-color: var(--amber-500);
            color: var(--amber-600);
        }

        .score-btn.bad:not(.selected):hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--red-500);
            color: var(--red-600);
        }

        .modal-footer {
            padding: var(--space-6);
            border-top: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            text-align: center;
        }

        /* Alert Modal */
        .alert-modal .modal-content {
            max-width: 400px;
            text-align: center;
        }

        .alert-icon {
            font-size: 3rem;
            margin-bottom: var(--space-4);
        }

        .alert-message {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: var(--space-6);
        }

        .alert-actions {
            display: flex;
            gap: var(--space-3);
            justify-content: center;
        }

        /* Loader */
        .loader {
            width: 2rem;
            height: 2rem;
            border: 3px solid var(--neutral-200);
            border-top: 3px solid var(--primary-500);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto var(--space-4);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: var(--space-3);
                padding-top: 70px;
            }

            .header {
                padding: var(--space-3) var(--space-4);
            }

            .header h1 {
                font-size: 1rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: var(--space-3);
            }

            .score-cards-grid {
                grid-template-columns: 1fr;
                gap: var(--space-4);
            }

            .actions {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }

            .score-buttons {
                grid-template-columns: 1fr;
            }

            .modal-content {
                margin: var(--space-2);
            }
        }

        @media (max-width: 480px) {
            .score-buttons {
                grid-template-columns: repeat(2, 1fr);
            }

            .score-btn {
                font-size: 0.7rem;
                padding: var(--space-2);
            }
        }

        /* Loading states */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Focus states for accessibility */
        .form-control:focus,
        .btn:focus,
        .score-btn:focus {
            outline: 2px solid var(--primary-500);
            outline-offset: 2px;
        }

        /* Status indicators */
        .status-complete {
            --card-accent: var(--green-500);
        }

        .status-partial {
            --card-accent: var(--amber-500);
        }

        .status-empty {
            --card-accent: var(--neutral-300);
        }

        /* Apply light green background to the entire card when complete */
        .score-card[data-status="complete"] {
            background: var(--green-50);
        }

        .score-card[data-status="complete"]::before {
            background: var(--green-500);
        }

        .score-card[data-status="partial"]::before {
            background: var(--amber-500);
        }

        .score-card[data-status="empty"]::before {
            background: var(--neutral-300);
        }

        /* CSS for Score Animation */
        .score-animation {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 1;
            font-size: 1.4rem;
            /* Slightly larger font */
            font-weight: 700;
            pointer-events: none;
            transition: transform 1s ease-out, opacity 1s ease-out;
            /* Increased duration */
            z-index: 10;
            white-space: nowrap;
            /* Prevent wrapping */
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            /* Added text shadow for visibility */
        }

        .score-animation.animate {
            transform: translate(-50%, -150%);
            /* Move up */
            opacity: 0;
        }

        .score-animation.positive {
            color: var(--green-600);
            /* Slightly darker green for better contrast */
        }

        .score-animation.negative {
            color: var(--red-600);
            /* Slightly darker red for better contrast */
        }

        /* Missing Data Modal Specific Styles */
        .missing-data-modal .modal-content {
            max-width: 500px;
            text-align: left;
        }

        .missing-data-modal .modal-body ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .missing-data-modal .modal-body ul li {
            padding: var(--space-2) 0;
            border-bottom: 1px solid var(--neutral-200);
            color: var(--text-primary);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .missing-data-modal .modal-body ul li:last-child {
            border-bottom: none;
        }

        .missing-data-modal .modal-body ul li i {
            color: var(--red-500);
        }

        /* Unauthorized Modal Specific Styles (New) */
        .unauthorized-modal .modal-content {
            max-width: 400px;
            text-align: center;
        }

        .unauthorized-modal .modal-icon {
            font-size: 3rem;
            margin-bottom: var(--space-4);
            color: var(--red-500);
        }

        .unauthorized-modal .modal-message {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: var(--space-6);
        }

        /* ── Remarks & Photo Upload ── */
        .item-extras-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.6rem;
            padding: 0.25rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--primary-600);
            background: var(--primary-50);
            border: 1px solid var(--primary-100);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }
        .item-extras-toggle:hover { background: var(--primary-100); }
        .item-extras-toggle.has-data {
            color: var(--green-600);
            background: var(--green-50);
            border-color: rgba(34,197,94,0.2);
        }
        .item-extras {
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.6rem;
            padding: 0.75rem;
            background: var(--neutral-50);
            border-radius: var(--radius-md);

            cloudName: 'dpr6tatjv',
            uploadPreset: 'upkeeping_photos',
            upload: async (file, folder, publicId) => {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY.uploadPreset);
                formData.append('folder', folder);
                if (publicId) formData.append('public_id', publicId);
                const res = await fetch(
                    `https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/image/upload`,
                    { method: 'POST', body: formData }
                );
                if (!res.ok) throw new Error('Upload failed: ' + res.statusText);
                const data = await res.json();
                return { url: data.secure_url, publicId: data.public_id };
            }
        };

        // ─── Image Compression (Canvas) ───
        const compressImage = (file, maxPx = 1200, quality = 0.78) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onerror = reject;
            reader.onload = e => {
                const img = new Image();
                img.onerror = reject;
                img.onload = () => {
                    let { width, height } = img;
                    if (width > maxPx || height > maxPx) {
                        if (width >= height) { height = Math.round(height * maxPx / width); width = maxPx; }
                        else { width = Math.round(width * maxPx / height); height = maxPx; }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        // ─── Offline Queue (localStorage) ───
        const OfflineQueue = {
            KEY: 'upkeeping_pending_reports',
            getAll: () => { try { return JSON.parse(localStorage.getItem(OfflineQueue.KEY) || '[]'); } catch { return []; } },
            save: (report) => {
                const q = OfflineQueue.getAll();
                q.push(report);
                localStorage.setItem(OfflineQueue.KEY, JSON.stringify(q));
            },
            remove: (id) => {
                const q = OfflineQueue.getAll().filter(r => r.id !== id);
                localStorage.setItem(OfflineQueue.KEY, JSON.stringify(q));
            },
            count: () => OfflineQueue.getAll().length
        };

        // ─── Sync Engine ───
        const SyncEngine = {
            isSyncing: false,
            dataUrlToBlob: (dataUrl) => {
                const [meta, b64] = dataUrl.split(',');
                const mime = meta.match(/:(.*?);/)[1];
                const bstr = atob(b64);
                const arr = new Uint8Array(bstr.length);
                for (let i = 0; i < bstr.length; i++) arr[i] = bstr.charCodeAt(i);
                return new Blob([arr], { type: mime });
            },
            updateBadge: () => {
                const badge = document.getElementById('pendingBadge');
                if (!badge) return;
                const n = OfflineQueue.count();
                badge.textContent = n;
                badge.style.display = n > 0 ? 'inline-block' : 'none';
            },
            syncReport: async (report) => {
                const cats = ['cleanliness','defective','recordKeeping','essentials','safety','aesthetics'];
                // Upload all pending photos (base64) to Cloudinary
                for (const cat of cats) {
                    if (!report[cat]) continue;
                    for (let i = 0; i < report[cat].length; i++) {
                        const item = report[cat][i];
                        if (!item.photos) continue;
                        for (let p = 0; p < item.photos.length; p++) {
                            const photo = item.photos[p];
                            if (photo.dataUrl && !photo.url) {
                                const blob = SyncEngine.dataUrlToBlob(photo.dataUrl);
                                const ssSlug = (report.ssName || 'ss').replace(/\s+/g, '_');
                                const folder = `upkeeping/${ssSlug}/${report.date}`;
                                const pubId = `${ssSlug}_${report.date}_${cat}_i${i}_p${p}_${report.id.slice(0,8)}`;
                                const result = await CLOUDINARY.upload(blob, folder, pubId);
                                // Replace base64 with CDN url (strip dataUrl to save Sheets space)
                                item.photos[p] = { url: result.url, publicId: result.publicId };
                            }
                        }
                    }
                }
                // Strip any remaining dataUrl before sending to Sheets
                const cleanReport = JSON.parse(JSON.stringify(report));
                for (const cat of cats) {
                    if (!cleanReport[cat]) continue;
                    cleanReport[cat].forEach(item => {
                        if (item.photos) item.photos = item.photos.map(p => ({ url: p.url, publicId: p.publicId }));
                    });

                // Submit to Google Sheets

                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cleanReport)
                });
            },
            sync: async () => {
                if (SyncEngine.isSyncing || !navigator.onLine) return;
                const queue = OfflineQueue.getAll();
                if (queue.length === 0) return;
                SyncEngine.isSyncing = true;
                for (const report of queue) {
                    try {
                        await SyncEngine.syncReport(report);
                        OfflineQueue.remove(report.id);
                        SyncEngine.updateBadge();
                    } catch (err) {
                        console.warn('Sync failed for report', report.id, err);
                    }
                }
                SyncEngine.isSyncing = false;
                if (OfflineQueue.count() === 0) {
                    console.log('All pending reports synced.');
                }
            }

                });

        // Score Card Component
        const ScoreCardComponent = {
            createScoreCard: (cardNum, type, title, itemCount) => { // Added itemCount parameter
                const card = document.createElement('div');

            populateModalItems: (type, items, scoreOptions) => {
                const list = document.getElementById('modalItemList');

                            extrasToggle.innerHTML = '📎 Add note / photo';
                            extrasToggle.classList.remove('has-data');

                            removeBtn.addEventListener('click', e => {

                                App[`${type}Items`][index].photos.splice(pIdx, 1);

                            slot.appendChild(img);
                            slot.appendChild(removeBtn);
                            photoArea.appendChild(slot);

                        // Add-photo slot (max 2)

                            gallerySlot.innerHTML = `

                                <div class="photo-slot-label">Camera</div>
                                <input type="file" accept="image/*" capture="environment">
                            `;

                            const handlePhotoInput = async (e, slotIcon) => {
                                const file = e.target.files[0];
                                if (!file) return;
                                if (file.size > 20 * 1024 * 1024) {
                                    alert('Photo must be under 20 MB.');
                                    e.target.value = '';
                                    return;
                                }
                                const originalIcon = slotIcon.textContent;
                                slotIcon.textContent = '⏳';
                                try {
                                    const dataUrl = await compressImage(file);
                                    App[`${type}Items`][index].photos.push({ dataUrl });
                                    renderPhotoSlots();
                                    updateToggle();

                                    slotIcon.textContent = '❌';

                                    setTimeout(() => { slotIcon.textContent = originalIcon; }, 2000);

                                e.target.value = '';

                            gallerySlot.querySelector('input').addEventListener('change', e => 
                                handlePhotoInput(e, gallerySlot.querySelector('.photo-slot-icon'))
                            );
                            cameraSlot.querySelector('input').addEventListener('change', e => 
                                handlePhotoInput(e, cameraSlot.querySelector('.photo-slot-icon'))
                            );

                            photoArea.appendChild(gallerySlot);
                            photoArea.appendChild(cameraSlot);

                        // Photo count hint
                        const hint = document.createElement('div');
                        hint.className = 'photo-count-hint';
                        hint.textContent = `${currentPhotos.length}/2 photos`;

                    renderPhotoSlots();

                    // Toggle open/close

                    extrasDiv.appendChild(textarea);
                    extrasDiv.appendChild(photoArea);

                    itemDiv.appendChild(extrasToggle);

            }
        };

        // Main Application
        const App = {
            cleanlinessItems: [],

            recordKeepingItems: [],
            essentialsItems: [],

            currentModalType: null,
            // URL for the Google Sheet CSV
            PIN_CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGTMdZNG8ktcf_-CWlhykS75a9RVAL5YHIN7glhcxIDOZssS_c_OmQEx_TzG8Hz1Wa1FbMIKxlHVeR/pub?gid=0&single=true&output=csv',

            init: () => {

            },


            // New function to initialize data on first load
            initializeData: () => {
                App.cleanlinessItems = CONFIG.data.cleanlinessItems.map(item => ({ ...item, score: null, remarks: '', photos: [] }));
                App.defectiveItems = CONFIG.data.defectiveItems.map(item => ({ ...item, score: null, remarks: '', photos: [] }));
                App.recordKeepingItems = CONFIG.data.recordKeepingItems.map(item => ({ name: item, score: null, remarks: '', photos: [] }));
                App.essentialsItems = CONFIG.data.essentialsItems.map(item => ({ name: item, score: null, remarks: '', photos: [] }));

                App.defectiveItems = CONFIG.data.defectiveItems.map(item => ({ ...item, score: null, remarks: '', photos: [] }));

            initializeScoreCards: () => {
                const container = document.getElementById('scoreCardsContainer');

                const categories = [
                    { id: 'cleanliness', title: 'Cleanliness', items: App.cleanlinessItems },
                    { id: 'defective', title: 'Defective Items', items: App.defectiveItems },
                    { id: 'recordKeeping', title: 'Record Keeping', items: App.recordKeepingItems },
                    { id: 'essentials', title: 'Essentials', items: App.essentialsItems },
                    { id: 'safety', title: 'Safety Equipment', items: App.safetyItems },
                    { id: 'aesthetics', title: 'Aesthetics & Discipline', items: App.aestheticsItems }
                ];

                categories.forEach((cat, index) => {

                    const card = ScoreCardComponent.createScoreCard(index + 1, cat.id, cat.title, cat.items.length);
                    container.appendChild(card);
                });

            setScore: (type, itemIndex, score) => {
                const map = {
                    cleanliness: App.cleanlinessItems,
                    defective: App.defectiveItems,
                    recordKeeping: App.recordKeepingItems,
                    essentials: App.essentialsItems,
                    safety: App.safetyItems,
                    aesthetics: App.aestheticsItems
                };

                if (map[type]) {
                    map[type][itemIndex].score = score;
                }
                App.updateAllScores();
            },

            updateAllScores: () => {
                const types = ['cleanliness', 'defective', 'recordKeeping', 'essentials', 'safety', 'aesthetics'];
                let totalCompleted = 0;
                let totalPoints = 0;
                let overallMaxPoints = 0;

                types.forEach(type => {
                    const items = App[`${type}Items`];
                    const completed = Utils.countCompleted(items);
                    const points = Utils.calculateTotalPoints(items);
                    const maxItems = items.length;

                    // Calculate max possible points for this category
                    const maxPoints = items.reduce((sum, item) => {
                        if (item.maxPoints != null) return sum + item.maxPoints;
                        if (item.scoreOptions && Array.isArray(item.scoreOptions)) {
                            return sum + Math.max(...item.scoreOptions.map(o => o.score));
                        }
                        // Default max is 2 for cleanliness, defective, recordkeeping, essentials, and safety
                        return sum + 2;
                    }, 0);

                    App.updateCardScore(type, completed, points, maxItems, maxPoints);
                    totalCompleted += completed;
                    totalPoints += points;
                    overallMaxPoints += maxPoints;
                });

                const allItemsCount = types.reduce((acc, type) => acc + App[`${type}Items`].length, 0);
                ProgressComponent.update(totalCompleted, allItemsCount, totalPoints, overallMaxPoints);
            },

                const scoreElement = document.getElementById(type + 'Score');
                const maxScoreElement = document.getElementById(type + 'MaxScore');
                const cardElement = document.getElementById(type + 'Card');

                if (itemsElement) itemsElement.textContent = `${completed}/${maxItems}`;
                if (scoreElement) scoreElement.textContent = points;
                if (maxScoreElement) maxScoreElement.textContent = `/${maxPoints}`;

                if (cardElement) {
                    const status = Utils.getCardStatus(completed, maxItems);
                    cardElement.setAttribute('data-status', status);
                }
            },

                App.currentModalType = type;
                document.getElementById('modalCategoryTitle').textContent = title;
                const itemsToPopulate = App[`${type}Items`];
                const scoreOptions = CONFIG.scoring[type].scoreOptions;
                ScoreCardComponent.populateModalItems(type, itemsToPopulate, scoreOptions);

                const modal = document.getElementById('itemModal');
                modal.classList.add('show');
            },

            closeItemModal: () => {
                const modal = document.getElementById('itemModal');
                modal.classList.remove('show');
                App.currentModalType = null;
            },

            handleModalDoneClick: () => {
                if (!App.currentModalType) return App.closeItemModal();
                
                const itemsArray = App[`${App.currentModalType}Items`];
                if (!itemsArray) return App.closeItemModal();

                const firstUnfilledIndex = itemsArray.findIndex(item => item.score === null);
                if (firstUnfilledIndex !== -1) {
                    const listContainer = document.getElementById('modalItemList');
                    const itemElements = listContainer.querySelectorAll('.score-item');
                    
                    if (itemElements[firstUnfilledIndex]) {
                        const el = itemElements[firstUnfilledIndex];
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        
                        // Briefly highlight the missing item
                        el.style.transition = 'all 0.3s ease';
                        el.style.transform = 'scale(1.02)';
                        el.style.boxShadow = '0 0 0 2px var(--amber-500)';
                        
                        setTimeout(() => {
                            el.style.transform = '';
                            el.style.boxShadow = '';
                        }, 600);
                        
                        return; // Prevent closing the modal
                    }
                }
                
                // If everything is filled, let it close
                App.closeItemModal();

                document.querySelector('#itemModal .modal-close').addEventListener('click', App.closeItemModal);

            // New function to handle report submission flow
            handleSubmitReport: () => {

                if (missing.length > 0) {
                    App.showMissingDataModal(missing);
                } else {
                    App.showPinModal();
                }

            getMissingData: () => {
                const missingItems = [];

                // Check form fields
                const date = document.getElementById('visitDate').value;
                const division = document.getElementById('division').value;
                const ssName = document.getElementById('ssName').value;
                const supervisor = document.getElementById('supervisor').value;
                const inspectingOfficer = document.getElementById('inspectingOfficer').value;

                if (!date) missingItems.push('Visit Date');
                if (!division) missingItems.push('Division');
                if (!ssName) missingItems.push('Substation');
                if (!supervisor) missingItems.push('Supervising DE/AE');
                // Removed Inspecting Officer from mandatory check, as it autofills from PIN

                // Check score items
                const categories = [
                    { id: 'cleanliness', title: 'Cleanliness', items: App.cleanlinessItems },
                    { id: 'defective', title: 'Defective Items', items: App.defectiveItems },
                    { id: 'recordKeeping', title: 'Record Keeping', items: App.recordKeepingItems },
                    { id: 'essentials', title: 'Essentials', items: App.essentialsItems },
                    { id: 'safety', title: 'Safety Equipment', items: App.safetyItems },
                    { id: 'aesthetics', title: 'Aesthetics & Discipline', items: App.aestheticsItems }
                ];

                categories.forEach(cat => {
                    cat.items.forEach(item => {
                        if (item.score === null) {
                            missingItems.push(`${cat.title}: ${item.name || item.label || item}`);
                        }
                    });
                });

                return missingItems;
            },

            showMissingDataModal: (missingItems) => {
                const modal = document.getElementById('missingDataModal');

                missingItems.forEach(item => {

            closeMissingDataModal: () => {
                const modal = document.getElementById('missingDataModal');
                modal.classList.remove('show');
            },

            generateReport: () => {
                const enrichWithOptions = (items, type) => {
                    const options = CONFIG.scoring[type].scoreOptions;
                    return items.map(item => ({ ...item, scoreOptions: options }));
                };

                const reportData = {
                    date: document.getElementById('visitDate').value,
                    division: document.getElementById('division').value,
                    ssName: document.getElementById('ssName').value,
                    supervisor: document.getElementById('supervisor').value,
                    inspectingOfficer: document.getElementById('inspectingOfficer').value,
                    cleanliness: enrichWithOptions(App.cleanlinessItems, 'cleanliness'),
                    defective: enrichWithOptions(App.defectiveItems, 'defective'),
                    recordKeeping: enrichWithOptions(App.recordKeepingItems, 'recordKeeping'),
                    essentials: enrichWithOptions(App.essentialsItems, 'essentials'),
                    safety: enrichWithOptions(App.safetyItems, 'safety'),
                    aesthetics: App.aestheticsItems
                };

                localStorage.setItem('scoreReport', JSON.stringify(reportData));
                // Open report.html in a new tab to preserve the current form state
                window.open('report.html', '_blank');
            },

            showPinModal: () => {
                document.getElementById('pinInput').value = '';
                document.getElementById('pinModal').classList.add('show');
            },

            closePinModal: () => {
                document.getElementById('pinModal').classList.remove('show');
            },

            // New function to fetch and parse PIN data from CSV
            fetchPinsFromCsv: async () => {
                try {
                    const response = await fetch(App.PIN_CSV_URL);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const csvText = await response.text();

                    const lines = csvText.trim().split('\n');
                    if (lines.length === 0) return [];

                    const CSV_FIELD_REGEX = /(?:\"([^\"]*(?:\"\"[^\"]*)*)\"|([^,]*))(?:,|$)/g;
                    const parseLine = (line) => {
                        const fields = [];
                        CSV_FIELD_REGEX.lastIndex = 0;
                        let match;
                        while ((match = CSV_FIELD_REGEX.exec(line)) !== null) {
                            let field = match[1] !== undefined ? match[1].replace(/""/g, '"') : match[2];
                            fields.push(field.trim());
                            if (match.index === CSV_FIELD_REGEX.lastIndex) CSV_FIELD_REGEX.lastIndex++;
                        }
                        return fields;
                    };

                    const headers = parseLine(lines[0]);
                    const data = [];

                    for (let i = 1; i < lines.length; i++) {
                        const lineFields = parseLine(lines[i]);
                        const row = {};
                        headers.forEach((header, index) => {
                            row[header] = lineFields[index] || '';
                        });
                        data.push(row);
                    }
                    return data;
                } catch (error) {
                    console.error("Error fetching or parsing PIN CSV:", error);
                    App.showAlert('❌', 'Failed to load PIN data. Please try again.', null, { hideCancel: true });
                    return [];
                }
            },

            handlePinSubmit: async () => {
                const pin = document.getElementById('pinInput').value.trim();
                App.closePinModal(); // Close PIN modal immediately

                App.showAlert('⏳', 'Verifying authorization...', null, { showLoader: true });

                const pinData = await App.fetchPinsFromCsv();
                let authorized = false;
                let officerName = '';

                for (const row of pinData) {
                    if (row.PIN === pin && row['ss-autho'] === 'Y') {
                        authorized = true;
                        officerName = row.Name || row.NAME || row.name || '';
                        break;
                    }
                }

                App.closeAlertModal(); // Close verification loader

                if (authorized) {
                    if (officerName) {
                        document.getElementById('inspectingOfficer').value = officerName;
                    }
                    App.submitReport();
                } else {
                    App.showUnauthorizedModal();
                }
            },

            submitReport: async () => {
                App.showAlert('❓', 'Submit this completed inspection report?', async () => {
                    App.showAlert('⏳', 'Saving report...', null, { showLoader: true });

                    const enrichWithOptions = (items, type) => {
                        const options = CONFIG.scoring[type].scoreOptions;
                        return items.map(item => ({ ...item, scoreOptions: options }));
                    };

                    const reportData = {
                        id: (typeof crypto !== 'undefined' && crypto.randomUUID)
                            ? crypto.randomUUID()
                            : Date.now().toString(36) + Math.random().toString(36).slice(2),
                        timestamp: new Date().toISOString(),
                        date: document.getElementById('visitDate').value,
                        division: document.getElementById('division').value,
                        ssName: document.getElementById('ssName').value,
                        supervisor: document.getElementById('supervisor').value,
                        inspectingOfficer: document.getElementById('inspectingOfficer').value,
                        cleanliness: enrichWithOptions(App.cleanlinessItems, 'cleanliness'),
                        defective: enrichWithOptions(App.defectiveItems, 'defective'),
                        recordKeeping: enrichWithOptions(App.recordKeepingItems, 'recordKeeping'),
                        essentials: enrichWithOptions(App.essentialsItems, 'essentials'),
                        safety: enrichWithOptions(App.safetyItems, 'safety'),
                        aesthetics: App.aestheticsItems
                    };

                    // ── Save to local offline queue ──
                    try { OfflineQueue.save(reportData); } catch (e) {
                        App.closeAlertModal();
                        App.showAlert('❌', 'Could not save report locally. Storage may be full.', null, { hideCancel: true });
                        return;
                    }
                    SyncEngine.updateBadge();
                    App.closeAlertModal();

                    if (navigator.onLine) {
                        App.showAlert('⏳', 'Syncing to server...', null, { showLoader: true });
                        try {
                            await SyncEngine.sync();
                            App.closeAlertModal();
                            App.showAlert('✅', 'Report submitted successfully!', null, { hideCancel: true });
                        } catch (err) {
                            App.closeAlertModal();
                            App.showAlert('📦', 'Report saved locally.\nNetwork issue during sync — will retry automatically when online.', null, { hideCancel: true });
                        }
                    } else {
                        App.showAlert('📦', 'No network detected.\nReport saved locally and will sync automatically when you are back online.', null, { hideCancel: true });
                    }
                });
            },

            showAlert: (icon, message, onOk = null, options = {}) => {
                const modal = document.getElementById('alertModal');
                const iconEl = document.getElementById('alertIcon');
                const messageEl = document.getElementById('alertMessage');
                const okBtn = document.getElementById('alertOkBtn');
                const cancelBtn = document.getElementById('alertCancelBtn');
                const loader = document.getElementById('alertLoader');
                const actions = document.getElementById('alertActions');

                iconEl.textContent = icon;
                messageEl.textContent = message;

                if (options.showLoader) {
                    loader.style.display = 'block';
                    actions.style.display = 'none';
                } else {
                    loader.style.display = 'none';
                    actions.style.display = 'flex';
                }

                cancelBtn.style.display = options.hideCancel ? 'none' : 'inline-flex';

                modal.classList.add('show');

                App.currentAlertCallback = onOk;
            },

            closeAlertModal: () => {
                const modal = document.getElementById('alertModal');
                modal.classList.remove('show');

                if (App.currentAlertCallback) {
                    App.currentAlertCallback();
                    App.currentAlertCallback = null;
                }
            },

            currentAlertCallback: null,

            // Photo Lightbox
            openLightbox: (url) => {
                document.getElementById('lightboxImg').src = url;
                document.getElementById('lightboxOverlay').classList.add('show');
            },
            closeLightbox: () => {
                document.getElementById('lightboxOverlay').classList.remove('show');
                setTimeout(() => { document.getElementById('lightboxImg').src = ''; }, 300);
            },

            // New functions for unauthorized modal
            showUnauthorizedModal: () => {
                document.getElementById('unauthorizedModal').classList.add('show');
            },

            closeUnauthorizedModal: () => {
                document.getElementById('unauthorizedModal').classList.remove('show');
            }
        };

        // Initialize app when DOM is loaded
        document.addEventListener('DOMContentLoaded', App.init);

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>
</body>
